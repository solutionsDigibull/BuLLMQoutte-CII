services:
  db:
    image: postgres:14-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: DigiBull
      POSTGRES_DB: bullmquote
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8501:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:DigiBull@db:5432/bullmquote
      SECRET_KEY: changeme-in-production
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
